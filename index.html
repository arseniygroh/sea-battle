<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle</title>
    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.toolbar.min.js"></script>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
</head>
<body>
    <div class="game-status">
        <div class="game-status-msg">Waiting for an oponent...</div>
        <div class="scores">
            <div class="score" id="my-score">My score: <span>0</span></div>
            <div class="score" id="enemy">Enemy score: <span>0</span></div>
        </div>
    </div>
    <div class="battlefield-wrapper">
        <div class="table-wrapper">
            <h1>YOU</h1>
            <div id="pivotContainer"></div>
        </div>
        <div class="table-wrapper">
            <h1>ENEMY</h1>
            <div id="enemyPivotContainer"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
